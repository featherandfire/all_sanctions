<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>International Sanctions Explorer</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-title">All Sanctions</div>
      <div class="logo-sub">International Dataset Explorer</div>
    </div>
    <nav>
      <button class="nav-item active" data-view="datasets" onclick="switchView('datasets')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Browse Datasets
      </button>
      <button class="nav-item" data-view="stats" onclick="switchView('stats')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Visual Statistics
      </button>
      <button class="nav-item" data-view="cyber" onclick="switchView('cyber')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Cyber &amp; Crypto
      </button>
      <button class="nav-item" data-view="pep" onclick="switchView('pep')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        PEP
      </button>
      <button class="nav-item" data-view="medicaid" onclick="switchView('medicaid')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        Medicaid
      </button>
      <button class="nav-item" data-view="entity-search" onclick="switchView('entity-search')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Entity Search
      </button>
      <button class="nav-item" data-view="countries" onclick="switchView('countries')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        Search By Country
      </button>
      <button class="nav-item" data-view="tags" onclick="switchView('tags')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        Tags
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="refresh-btn" onclick="refreshData()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Refresh Data
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <!-- Topbar -->
    <div class="topbar">
      <span class="page-title" id="page-title">Browse Datasets</span>
      <div class="search-wrap" id="search-wrap">
        <svg class="search-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="search-input" type="text" placeholder="Search datasets…" oninput="onSearch(this.value)">
      </div>
      <select class="filter-select" id="filter-select" onchange="onFilterChange(this.value)">
        <option value="">All fields</option>
        <option value="tag">By tag</option>
        <option value="country">By country</option>
        <option value="type">By type</option>
      </select>
      <div class="view-toggle" id="view-toggle">
        <button class="view-btn active" id="grid-btn" onclick="setLayout('grid')" title="Grid view">
          <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
        <button class="view-btn" id="list-btn" onclick="setLayout('list')" title="List view">
          <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="2"/><line x1="8" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="2"/><line x1="8" y1="18" x2="21" y2="18" stroke="currentColor" stroke-width="2"/><circle cx="3" cy="6" r="1.5" fill="currentColor"/><circle cx="3" cy="12" r="1.5" fill="currentColor"/><circle cx="3" cy="18" r="1.5" fill="currentColor"/></svg>
        </button>
      </div>
    </div>

    <!-- Content -->
    <div class="content" id="content">
      <div class="loading"><div class="spinner"></div><div class="loading-text">Loading datasets…</div></div>
    </div>
  </div>
</div>

<!-- Detail panel -->
<div class="detail-overlay" id="detail-overlay" style="display:none" onclick="closeDetail(event)">
  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <div>
        <div class="detail-title" id="detail-title"></div>
        <div class="card-name" id="detail-name" style="margin-top:4px"></div>
      </div>
      <button class="close-btn" onclick="closeDetailPanel()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<!-- Resource table viewer -->
<div id="table-overlay" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column">
  <div style="display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0">
    <button onclick="closeResourceTable()" style="background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:5px" title="Back">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>
    <span id="table-title" style="font-size:14px;font-weight:600;color:var(--text)"></span>
    <span id="table-count" style="font-size:12px;color:var(--muted)"></span>
    <div style="flex:1"></div>
    <div style="position:relative">
      <svg style="position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted)" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="table-search" type="text" placeholder="Search rows…"
        style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px 7px 30px;font-size:12px;color:var(--text);outline:none;width:220px"
        oninput="filterTableRows(this.value)">
    </div>
    <a id="table-dl-link" href="#" target="_blank"
      style="font-size:12px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:5px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius)">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download
    </a>
  </div>
  <div id="table-loading" style="display:none;flex:1;align-items:center;justify-content:center;flex-direction:column;gap:12px">
    <div class="spinner"></div>
    <div style="color:var(--muted);font-size:13px">Fetching data…</div>
  </div>
  <div id="table-wrap" style="flex:1;overflow:auto;display:none">
    <table id="resource-table" style="width:100%;border-collapse:collapse;font-size:12px">
      <thead id="resource-thead" style="position:sticky;top:0;z-index:1"></thead>
      <tbody id="resource-tbody"></tbody>
    </table>
  </div>
</div>

<div class="notif" id="notif"></div>

<script src="{{ url_for('static', filename='js/constants.js') }}"></script>
<script src="{{ url_for('static', filename='js/utils.js') }}"></script>
<script src="{{ url_for('static', filename='js/charts.js') }}"></script>
<script src="{{ url_for('static', filename='js/tables.js') }}"></script>
<script src="{{ url_for('static', filename='js/views/datasets.js') }}"></script>
<script src="{{ url_for('static', filename='js/views/stats.js') }}"></script>
<script src="{{ url_for('static', filename='js/views/cyber.js') }}"></script>
<script src="{{ url_for('static', filename='js/views/pep.js') }}"></script>
<script src="{{ url_for('static', filename='js/views/medicaid.js') }}"></script>
<script src="{{ url_for('static', filename='js/views/entity-search.js') }}"></script>
<script src="{{ url_for('static', filename='js/views/countries.js') }}"></script>
<script src="{{ url_for('static', filename='js/views/tags.js') }}"></script>
<script src="{{ url_for('static', filename='js/core.js') }}"></script>
</body>
</html>
